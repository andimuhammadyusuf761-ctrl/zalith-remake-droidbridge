name: Android Build

on:
  push:
    branches:
      - aurora
      - aurora-*
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-build:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ZL_BUILD_TYPE: DEBUG
      CURSEFORGE_API_KEY: DUMMY
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
        -Dkotlin.compiler.execution.strategy=in-process

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools and NDK
        run: |
          sdkmanager --install \
            'platforms;android-34' \
            'build-tools;34.0.0' \
            'ndk;25.2.9519653' \
            'cmake;3.22.1'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Validate Gradle configuration
        run: ./gradlew projects --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :ZalithLauncher:assembleDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zalith-launcher-debug-apk
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
          if-no-files-found: error
